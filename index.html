<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clykia - Hoş Geldiniz</title>
    <style>
        /* CSS Kodları Buraya Yazılır */
        body {
            background-color: #f0f4f8; /* Açık modern bir arka plan rengi */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Şık bir yazı tipi */
            color: #333333; /* Yazı rengi */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Sayfayı dikeyde ortalamak için */
            margin: 0;
        }

        h1 {
            color: #0056b3; /* Başlık rengi (Mavi tonlarında) */
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #555555;
            background-color: #ffffff; /* Yazının arkasına beyaz bir kutu */
            padding: 15px 25px;
            border-radius: 8px; /* Köşeleri yuvarlatma */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Hafif gölge efekti */
        }
    </style>
</head>
<body>

    <h1>Merhaba, Ben Hanifi!</h1>
    <p>Clykia şirketinde çalışıyorum. Bu benim renkli HTML kodum.</p>

</body>
</html>
